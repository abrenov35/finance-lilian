<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FINANCE LILIAN</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6f9;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1{
margin-top:0;
}

input,select,button{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
background:#0f766e;
color:white;
font-weight:bold;
border:none;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
margin-bottom:20px;
}

.stat{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.stat h2{
margin:0;
font-size:28px;
}

.green{color:#0f766e;}
.red{color:#be123c;}

.op{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 6px rgba(0,0,0,.05);
}

.small{
font-size:12px;
color:#666;
}

.del{
background:#be123c;
padding:6px 10px;
width:auto;
margin-left:10px;
}

@media(max-width:700px){
.row,.stats{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="container">

<h1>FINANCE LILIAN</h1>

<div class="stats">
<div class="stat">
<div>Solde</div>
<h2 id="solde">0 €</h2>
</div>

<div class="stat">
<div>Dépôts</div>
<h2 class="green" id="depot">0 €</h2>
</div>

<div class="stat">
<div>Paiements</div>
<h2 class="red" id="paie">0 €</h2>
</div>
</div>

<div class="row">

<div class="card">

<select id="type">
<option value="credit">Dépôt Lilian</option>
<option value="debit">Paiement</option>
</select>

<input type="date" id="date">

<input type="text" id="label" placeholder="Libellé">

<select id="compte">
<option value="">Choisir un compte</option>
<option>BPO Clémence</option>
<option>SG Lilian</option>
<option>BPO Pascale</option>
<option>Compte joint</option>
</select>

<input type="number" id="montant" placeholder="Montant">

<button onclick="addRow()">Enregistrer</button>

</div>

<div>

<div id="operations"></div>

</div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzVLH4mPhhtDk8zGMoRBNI1gzupfkulD8f9OG9sTsWAFBPRHrIaQUNVqfO51KT3tr9C/exec";

let rows = [];

document.getElementById('date').value =
new Date().toISOString().split('T')[0];

function euro(n){
return Number(n).toLocaleString('fr-FR',{
minimumFractionDigits:2,
maximumFractionDigits:2
}) + ' €';
}

async function charger(){

const res = await fetch(API_URL);
const json = await res.json();

rows = json.data || [];

render();
}

function render(){

let solde = 0;
let depot = 0;
let paie = 0;

const div = document.getElementById('operations');

div.innerHTML = '';

rows.forEach((r,i)=>{

const d = Number(r.depot)||0;
const p = Number(r.paie)||0;

depot += d;
paie += p;

solde += d-p;

const el = document.createElement('div');

el.className='op';

el.innerHTML = `
<div>
<div><strong>${r.label}</strong></div>
<div class="small">${r.date} • ${r.compte}</div>
</div>

<div>
<div style="font-weight:bold;color:${d>0?'#0f766e':'#be123c'}">
${d>0?'+':'-'}${euro(d||p)}
</div>

<button class="del" onclick="suppr(${i})">
X
</button>
</div>
`;

div.prepend(el);

});

document.getElementById('solde').innerText = euro(solde);
document.getElementById('depot').innerText = euro(depot);
document.getElementById('paie').innerText = euro(paie);

}

async function addRow(){

const type = document.getElementById('type').value;

const row = {
date: document.getElementById('date').value,
label: document.getElementById('label').value,
compte: document.getElementById('compte').value,
depot: type==='credit'
? Number(document.getElementById('montant').value)
: 0,
paie: type==='debit'
? Number(document.getElementById('montant').value)
: 0
};

await fetch(API_URL,{
method:'POST',
body:JSON.stringify(row)
});

charger();

document.getElementById('label').value='';
document.getElementById('montant').value='';

}

async function suppr(i){

await fetch(API_URL,{
method:'POST',
body:JSON.stringify({
_action:'delete',
index:i
})
});

charger();

}

charger();

</script>

</body>
</html>
